<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="ÉLYSIA — Luxury fashion, curated. Editorial collections, timeless craft." />
    <title>ÉLYSIA — Luxury Fashion</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Cormorant Garamond is the cross-platform fallback for Sitka Subheading Semibold -->
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&display=swap"
      rel="stylesheet"
    />
    <script>
      // Apply persisted theme before paint to avoid a flash of the wrong theme.
      (function () {
        try {
          var t = localStorage.getItem("elysia-theme");
          if (t === "light") document.documentElement.classList.remove("dark");
          else document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
